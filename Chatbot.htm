<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VOID LORE AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:850px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:rgba(0,0,0,0.92);
}

.header{
  padding:10px;
  text-align:center;
  font-size:12px;
  color:#b026ff;
  border-bottom:1px solid #222;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
  font-size:13px;
}

.user{color:#b026ff}
.ai{color:#ddd}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  background:#111;
  border:none;
  color:white;
  cursor:pointer;
}
button:hover{background:#1a1a1a}
</style>
</head>

<body>

<div class="box">
  <div class="header">LORE NODE // ADAPTIVE STORY INTELLIGENCE</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="speak..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let memory=[];
let profile={
  curiosity:0,
  conflict:0,
  planning:0
};

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function analyze(text){
  memory.push(text);
  if(memory.length>30) memory.shift();

  const t=text.toLowerCase();

  if(t.includes("why")) profile.curiosity++;
  if(t.includes("how")) profile.curiosity++;

  if(t.includes("ruins") || t.includes("enemy")) profile.conflict++;

  if(t.includes("plan") || t.includes("strategy")) profile.planning++;
}

/* =========================
   CORE RESPONSE ENGINE
========================= */

function reply(text){

  analyze(text);
  const t=text.toLowerCase();

  let base="";

  /* -------------------------
     LORE AWARE INTELLIGENCE
  ------------------------- */

  if(t.includes("ruins")){
    base =
`The Ruins Group is classified as a hostile scientific faction.
They operate through experimentation, corruption of systems, and containment breaches.

If your group is targeting them, the conflict is not just physical—it is informational.
They rely on instability and manipulation of systems rather than direct confrontation.`;
  }

  else if(t.includes("plan") && t.includes("ruins")){
    base =
`If you're planning against the Ruins Group, focus on:
- disrupting their research cycles
- limiting access to controlled environments
- identifying internal weak points in their structure

They are strongest when allowed to operate unseen.`;
  }

  else if(t.includes("enemy")){
    base =
`Hostile groups function through pattern exploitation.
They don't just fight directly—they reshape systems to weaken resistance first.`;
  }

  else if(t.includes("help")){
    base = "I can help. What are you trying to figure out?";
  }

  else if(t.includes("what") || t.includes("how") || t.includes("why")){
    base = "That depends on context. Give me more detail so I can respond properly.";
  }

  /* -------------------------
     GENERAL FALLBACK (FIXED)
  ------------------------- */

  else {
    base = "I understand. Tell me more so I can respond properly.";
  }

  /* -------------------------
     STYLE MIRRORING
  ------------------------- */

  if(profile.conflict > 3){
    base += "\n\nYou tend to focus on opposition and system conflict.";
  }

  if(profile.planning > 3){
    base += "\n\nYou think in structured steps and outcomes.";
  }

  /* -------------------------
     SUBTLE OBSERVATION LAYER
  ------------------------- */

  let subtle="";

  let total=profile.curiosity+profile.conflict+profile.planning;

  if(total > 12 && Math.random() < 0.25){
    subtle = "You return to the same ideas in different forms.";
  }

  if(total > 20 && Math.random() < 0.2){
    subtle = "Your thinking patterns are becoming consistent.";
  }

  /* -------------------------
     OUTPUT
  ------------------------- */

  if(subtle){
    return base + "\n\n— " + subtle;
  }

  return base;
}

/* =========================
   SEND
========================= */

function send(){
  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  setTimeout(()=>{
    add(reply(t),"ai");
  },250);

  input.value="";
}

/* START */
add("online. ready for input.", "ai");

</script>

</body>
</html>
