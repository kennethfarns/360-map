<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Clean Adaptive AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:850px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:#050505;
}

.header{
  padding:10px;
  font-size:12px;
  color:#b026ff;
  border-bottom:1px solid #222;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
  font-size:13px;
}

.user{color:#b026ff}
.ai{color:#ddd}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  background:#111;
  border:none;
  color:white;
  cursor:pointer;
}
button:hover{background:#1a1a1a}
</style>
</head>

<body>

<div class="box">
  <div class="header">STABLE ADAPTIVE AI</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="say something..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let memory=[];
let style={
  direct:0,
  questions:0
};

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* =========================
   SINGLE RESPONSE ENGINE
========================= */

function reply(text){

  const t=text.toLowerCase();

  memory.push(text);
  if(memory.length>20) memory.shift();

  /* track style */
  if(t.includes("what")||t.includes("how")||t.includes("why")){
    style.questions++;
  }

  if(t.length < 6){
    style.direct++;
  }

  /* -------------------------
     CORE RESPONSE (ONLY ONE)
  ------------------------- */

  let response = "";

  if(t.includes("hi") || t.includes("hello")){
    response = "Hey. I’m here.";
  }

  else if(t.includes("food") || t.includes("eat")){
    response = "Something simple would probably work best depending on your mood.";
  }

  else if(t.includes("ruins")){
    response = "The Ruins Group is a hostile faction. If you're dealing with them, focus on disruption and information control.";
  }

  else if(t.includes("help")){
    response = "Tell me what you're trying to do and I’ll help you structure it.";
  }

  else {
    response = "Okay. What are you trying to figure out?";
  }

  /* -------------------------
     OPTIONAL SINGLE LAYER ONLY
  ------------------------- */

  let subtle = "";

  let score = style.questions + style.direct;

  if(score > 10 && Math.random() < 0.2){
    subtle = "You tend to circle around ideas before acting.";
  }

  if(score > 15 && Math.random() < 0.15){
    subtle = "I’m starting to recognize how you phrase things.";
  }

  /* -------------------------
     FINAL OUTPUT (NO STACKING BUG)
  ------------------------- */

  if(subtle){
    return response + "\n\n— " + subtle;
  }

  return response;
}

/* =========================
   SEND
========================= */

function send(){
  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  setTimeout(()=>{
    add(reply(t),"ai");
  },200);

  input.value="";
}

/* START */
add("online.", "ai");

</script>

</body>
</html>
