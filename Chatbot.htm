<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Stable Chat AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:850px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:#050505;
}

.header{
  padding:10px;
  font-size:12px;
  color:#b026ff;
  border-bottom:1px solid #222;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
}

.user{color:#b026ff}
.ai{color:#ddd}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
}

button{
  padding:10px;
  background:#111;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <div class="header">STABLE AI // NO LOOP MODE</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="type..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

function add(t,c){
  const d=document.createElement("div");
  d.className="msg "+c;
  d.textContent=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* =========================
   SINGLE RESPONSE ENGINE
========================= */

function reply(t){

  const text = t.toLowerCase();

  /* --- RUINS GROUP LORE --- */
  if(text.includes("ruins")){

    if(text.includes("plan")){
      return `A structured approach against the Ruins Group:

- disrupt their research operations
- restrict their access to controlled zones
- identify internal system weaknesses

They depend on continuity of experiments. Breaking that continuity is key.`;
    }

    return `The Ruins Group is a rogue scientific faction.

They focus on experimentation, system corruption, and unstable technology development.

They are dangerous because they operate indirectly rather than through open conflict.`;
  }

  /* --- BASIC RESPONSES --- */

  if(text.includes("hello") || text.includes("hi")){
    return "Hey.";
  }

  if(text.includes("food") || text.includes("eat")){
    return "Something simple would probably be fine.";
  }

  if(text.includes("help")){
    return "Tell me what you're trying to figure out.";
  }

  if(text.includes("what") || text.includes("how") || text.includes("why")){
    return "I need a bit more detail to answer that properly.";
  }

  /* --- FINAL SAFE FALLBACK --- */
  return "I understand. What exactly do you want to focus on?";
}

/* =========================
   SEND (NO DOUBLE OUTPUT BUG)
========================= */

function send(){

  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  const r = reply(t); // IMPORTANT: only called ONCE

  setTimeout(()=>{
    add(r,"ai");
  },200);

  input.value="";
}

add("online.", "ai");

</script>

</body>
</html>
