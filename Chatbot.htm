<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Stable AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:850px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:#050505;
}

.header{
  padding:10px;
  font-size:12px;
  color:#b026ff;
  border-bottom:1px solid #222;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
  font-size:13px;
}

.user{color:#b026ff}
.ai{color:#ddd}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px;
  background:#111;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <div class="header">STABLE CONVERSATIONAL AI</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="type..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* =========================
   SINGLE DECISION ENGINE
========================= */

function reply(text){

  const t=text.toLowerCase();

  /* -------------------------
     RUINS GROUP LORE EXPANSION
  ------------------------- */

  if(t.includes("ruins")){

    return `The Ruins Group is a rogue scientific faction in your world.

They operate through:
- experimentation on living systems
- corruption of environments and structures
- manipulation of unstable technologies

They are not strong because of numbers—they are strong because they understand how to destabilize systems from within.

If your group is opposing them, the conflict is about control of information, resources, and containment of their experiments.`;
  }

  /* -------------------------
     STRATEGY CONTEXT
  ------------------------- */

  if(t.includes("plan") && t.includes("ruins")){
    return `A strategic approach against them would focus on three areas:

1. limiting their access to experimental zones
2. disrupting their research continuity
3. identifying internal vulnerabilities in their structure

They rely on uninterrupted development.`;
  }

  /* -------------------------
     NORMAL CONVERSATION
  ------------------------- */

  if(t.includes("hi") || t.includes("hello")){
    return "Hey.";
  }

  if(t.includes("food") || t.includes("eat")){
    return "Something simple or warm would probably work.";
  }

  if(t.includes("help")){
    return "Tell me what you're trying to do.";
  }

  if(t.includes("what") || t.includes("how") || t.includes("why")){
    return "Give me a bit more detail so I can answer properly.";
  }

  /* -------------------------
     FINAL FALLBACK (ONLY ONCE)
  ------------------------- */

  return "I understand. Can you expand on that?";
}

/* =========================
   SEND
========================= */

function send(){
  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  const response = reply(t);

  setTimeout(()=>{
    add(response,"ai");
  },200);

  input.value="";
}

add("online.", "ai");

</script>

</body>
</html>
