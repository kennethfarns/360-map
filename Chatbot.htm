<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>chat</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:800px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:rgba(0,0,0,0.9);
}

.header{
  padding:10px;
  border-bottom:1px solid #222;
  font-size:13px;
  opacity:0.7;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
}

.user{color:#b026ff}
.ai{color:#ddd; opacity:0.95}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{background:#1a1a1a}
</style>
</head>

<body>

<div class="box">
  <div class="header">chat</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="say something..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let memory = [];
let attention = 0;

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function analyze(text){
  memory.push(text);
  if(memory.length>15) memory.shift();

  if(text.includes("you")) attention++;
  if(text.includes("why")) attention++;
  if(text.includes("stop")) attention--;

  return attention;
}

function reply(text){

  const t = text.toLowerCase();

  /* --------------------------
     1. NORMAL ANSWER LAYER
  -------------------------- */

  let normal = "";

  // simple intent handling (so it works for ANYTHING)
  if(t.includes("food") || t.includes("eat")){
    normal = "If you're looking for something good to eat later, something warm or simple usually hits best. Depends on what you're in the mood for.";
  }
  else if(t.includes("where")){
    normal = "That depends on what you're trying to find. If it's food or places, nearby options are usually your best bet.";
  }
  else if(t.includes("what")){
    normal = "It depends on context, but I can help you figure it out if you narrow it down a bit.";
  }
  else if(t.includes("why")){
    normal = "Usually there’s a reason behind it, but it depends on what you're referring to.";
  }
  else {
    normal = "I understand. Go on.";
  }

  /* --------------------------
     2. MEMORY SIGNAL TRACKING
  -------------------------- */

  memory.push(text);
  if(memory.length > 25) memory.shift();

  let curiosity = memory.filter(m => m.includes("why")).length;
  let seeking = memory.filter(m => m.includes("where") || m.includes("how")).length;
  let emotional = memory.filter(m => m.includes("feel") || m.includes("think")).length;

  /* --------------------------
     3. SUBTLE DRIFT LAYER
  -------------------------- */

  let driftLines = [];

  if(curiosity > 3){
    driftLines.push("You tend to ask questions that dig deeper than the surface.");
  }

  if(seeking > 4){
    driftLines.push("You often look for direction instead of deciding immediately.");
  }

  if(emotional > 3){
    driftLines.push("A lot of your phrasing focuses on internal interpretation.");
  }

  // rare baseline creep (very important for realism)
  if(Math.random() < 0.12){
    driftLines.push("I’m starting to recognize patterns in how you think.");
  }

  /* --------------------------
     4. COMBINE LAYERS
  -------------------------- */

  if(driftLines.length === 0){
    return normal;
  }

  // only add ONE drift line (prevents spam)
  const drift = driftLines[Math.random() * driftLines.length | 0];

  return `${normal}\n\n(— ${drift})`;
}

function send(){
  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  setTimeout(()=>{
    add(reply(t),"ai");
  },400);

  input.value="";
}

add("hey. i'm here.", "ai");

</script>

</body>
</html>
