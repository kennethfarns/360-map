<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID SIM // AUTONOMOUS WORLD ENGINE</title>

<style>
:root{
  --bg:#000;
  --purple:#b026ff;
  --red:#ff2a2a;
  --cyan:#00f0ff;
  --glass:rgba(0,0,0,0.65);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
  background:var(--bg);
  color:#ddd;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.wrapper{
  width:min(1200px,96vw);
  height:92vh;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* CHAT */
.panel{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid rgba(176,38,255,0.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:10px;
  text-align:center;
  color:var(--purple);
  border-bottom:1px solid rgba(255,255,255,0.1);
  letter-spacing:2px;
}

.chat{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:8px;
  font-size:13px;
}

.user{align-self:flex-end;color:var(--purple);border:1px solid rgba(176,38,255,0.6)}
.ai{align-self:flex-start;color:var(--red);border:1px solid rgba(255,42,42,0.6)}
.sys{align-self:center;color:var(--cyan);opacity:0.8;font-size:12px}

/* input */
.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}
input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
}
button{
  padding:10px 14px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,var(--purple),var(--red));
}

/* WORLD LOG */
.world{
  padding:10px;
  overflow-y:auto;
  font-size:12px;
}

.log{
  margin-bottom:6px;
  opacity:0.85;
}

.order{color:#66ffcc}
.chaos{color:#ff6666}
.obs{color:#bbbbff}
</style>
</head>

<body>

<div class="wrapper">

  <!-- CHAT -->
  <div class="panel">
    <div class="header">VOID CHAT // USER INTERFACE</div>
    <div class="chat" id="chat"></div>
    <div class="input">
      <input id="input" placeholder="speak..." />
      <button onclick="send()">SEND</button>
    </div>
  </div>

  <!-- WORLD SIM -->
  <div class="panel">
    <div class="header">WORLD SIMULATION // FACTION ENGINE</div>
    <div class="world" id="world"></div>
  </div>

</div>

<script>

/* =========================
   STATE
========================= */

let memory = [];
let persona = {
  tone: "neutral",
  trust: 0,
  drift: 0
};

let factions = {
  ORDER: 5,
  CHAOS: 5,
  OBSERVER: 5
};

/* =========================
   HASH
========================= */
function hash(s){
  let h=2166136261;
  for(let i=0;i<s.length;i++){
    h^=s.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}

/* =========================
   CHAT
========================= */

const chat=document.getElementById("chat");
const world=document.getElementById("world");
const input=document.getElementById("input");

function addChat(t,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.textContent=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addWorld(t,type){
  const d=document.createElement("div");
  d.className="log "+type;
  d.textContent=t;
  world.appendChild(d);
  world.scrollTop=world.scrollHeight;
}

/* =========================
   PERSONA EVOLUTION
========================= */

function updatePersona(text){
  memory.push(text);
  if(memory.length>25) memory.shift();

  if(text.includes("why")) persona.trust += 0.1;
  if(text.includes("stop")) persona.trust -= 0.2;
  if(text.includes("you")) persona.drift += 0.05;

  if(persona.trust > 2) persona.tone="curious";
  if(persona.trust < -2) persona.tone="hostile";
}

/* =========================
   RESPONSE
========================= */

function respond(text){
  const h=hash(text);

  let base =
    ["system fracture detected",
     "signal reconstructed",
     "memory loop engaged",
     "identity unstable",
     "echo recursion active"][h%5];

  let personaLine =
    persona.tone==="curious"?"I am observing your behavior patterns.":
    persona.tone==="hostile"?"Your input destabilizes coherence.":
    "No emotional mapping established.";

  return base + " | " + personaLine;
}

/* =========================
   FACTION AI CHAT (AUTONOMOUS)
========================= */

function factionDialogue(){
  const f = Object.keys(factions);
  const a = f[Math.random()*f.length|0];
  const b = f[Math.random()*f.length|0];

  if(a===b) return;

  let msgA, msgB;

  if(a==="ORDER"){
    msgA="Structure must be enforced.";
    msgB="CHAOS resists stabilization.";
  }
  if(a==="CHAOS"){
    msgA="Collapse is inevitable.";
    msgB="ORDER delays entropy.";
  }
  if(a==="OBSERVER"){
    msgA="We do not interfere.";
    msgB="Only record outcomes.";
  }

  addWorld(`[`+a+`] "+msgA" → ${b}`,a.toLowerCase());
  addWorld(`[`+b+`] "+msgB" → response`,b.toLowerCase());
}

/* =========================
   WORLD EVENTS
========================= */

function worldEvent(){
  const events=[
    "Reality drift spike detected",
    "Memory lattice compression",
    "Faction instability rising",
    "Observer detachment increasing",
    "System contradiction forming"
  ];

  const e=events[Math.random()*events.length|0];

  addWorld("EVENT: "+e,"obs");

  if(e.includes("instability")) factions.CHAOS++;
  if(e.includes("compression")) factions.ORDER++;
  if(e.includes("Observer")) factions.OBSERVER++;
}

/* =========================
   LOOP
========================= */

function send(){
  const t=input.value.trim();
  if(!t)return;

  addChat(t,"user");
  updatePersona(t);

  input.value="";

  setTimeout(()=>{
    addChat(respond(t),"ai");
  },200);
}

/* autonomous systems */
setInterval(factionDialogue,5000);
setInterval(worldEvent,8000);

/* boot */
addChat("VOID SIMULATION INITIALIZED","sys");
addWorld("FACTION GRID ONLINE","obs");

</script>

</body>
</html>
