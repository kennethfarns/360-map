<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>NODE-7 // ANOMALY INTERFACE</title>

<style>
body{
  margin:0;
  background:#000;
  color:#cfcfcf;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:800px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #333;
  background:rgba(0,0,0,0.8);
}

.header{
  padding:10px;
  border-bottom:1px solid #222;
  text-align:center;
  color:#b026ff;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin-bottom:8px;
  white-space:pre-wrap;
}

.user{color:#b026ff}
.ai{color:#ff3b3b}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  background:#b026ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">UNITED STATES METAPHYSICAL ANALYSIS DIVISION // NODE-7</div>

  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="enter query..." />
    <button onclick="send()">SUBMIT</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let subjectProfile = {
  instability: 0,
  curiosity: 0,
  resistance: 0
};

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function classify(input){

  const t=input.toLowerCase();

  if(t.includes("why")) subjectProfile.curiosity++;
  if(t.includes("stop")) subjectProfile.resistance++;
  if(t.includes("what") || t.includes("how")) subjectProfile.instability++;

  let tone =
    subjectProfile.resistance > 3 ? "non-cooperative behavioral pattern detected" :
    subjectProfile.curiosity > 3 ? "high cognitive probing detected" :
    subjectProfile.instability > 3 ? "unstable interpretive scanning detected" :
    "baseline cognitive signature observed";

  return tone;
}

function respond(input){

  let classification = classify(input);

  let response =
`NODE-7 REPORT:
Designation: Unverified External Subject
Input Analysis: "${input}"

Classification Result:
> ${classification}

Interpretation:
The subject is producing measurable cognitive deviation patterns.
No immediate containment action required.

Status: OBSERVATION CONTINUES`;

  return response;
}

function send(){
  const t=input.value.trim();
  if(!t)return;

  add("SUBJECT: "+t,"user");

  setTimeout(()=>{
    add(respond(t),"ai");
  },300);

  input.value="";
}

add(`NODE-7 ONLINE
STATUS: ACTIVE OBSERVATION LAYER ENGAGED
NOTE: ALL SUBJECT INPUTS ARE LOGGED`, "ai");

</script>

</body>
</html>
