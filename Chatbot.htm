<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID SIM // WORLD GAME ENGINE</title>

<style>
:root{
  --bg:#000;
  --purple:#b026ff;
  --red:#ff2a2a;
  --cyan:#00f0ff;
  --glass:rgba(0,0,0,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
  background:var(--bg);
  color:#ddd;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.wrapper{
  width:min(1300px,98vw);
  height:94vh;
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:10px;
}

.panel{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid rgba(176,38,255,0.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:10px;
  text-align:center;
  color:var(--purple);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin-bottom:6px;
  font-size:12px;
}

.user{color:var(--purple)}
.ai{color:var(--red)}
.sys{color:var(--cyan)}

.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
}

button{
  padding:10px;
  border:none;
  background:linear-gradient(90deg,var(--purple),var(--red));
}

.world{
  padding:10px;
  overflow-y:auto;
  font-size:12px;
}

/* STATUS BAR */
.status{
  padding:8px;
  font-size:11px;
  color:var(--cyan);
  border-top:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="wrapper">

<!-- CHAT -->
<div class="panel">
  <div class="header">VOID GAME // PLAYER INTERFACE</div>
  <div class="chat" id="chat"></div>
  <div class="input">
    <input id="input" placeholder="say something..." />
    <button onclick="send()">SEND</button>
  </div>
</div>

<!-- WORLD -->
<div class="panel">
  <div class="header">WORLD STATE</div>
  <div class="world" id="world"></div>
</div>

<!-- STATUS -->
<div class="panel">
  <div class="header">GAME STATUS</div>
  <div class="chat" id="status"></div>
</div>

</div>

<script>

/* =========================
   GAME STATE
========================= */

let world = {
  order: 40,
  chaos: 40,
  instability: 20,
  turns:0
};

/* multiplayer simulation */
let echoes = [
  "unknown user stabilized a sector",
  "external anomaly increased chaos",
  "remote system reduced instability"
];

/* =========================
   HUMAN READABLE ENGINE
========================= */

function explainState(){
  if(world.instability > 70){
    return "The world is close to collapse. Chaos is too strong.";
  }
  if(world.order > world.chaos){
    return "Order is currently in control. The system is stable.";
  }
  if(world.chaos > world.order){
    return "Chaos is taking over. The system is becoming unpredictable.";
  }
  return "The system is balanced but fragile.";
}

/* =========================
   GAME LOGIC
========================= */

function update(input){

  world.turns++;

  if(input.includes("order")){
    world.order += 5;
    world.chaos -= 2;
  }

  if(input.includes("chaos")){
    world.chaos += 5;
    world.order -= 2;
  }

  if(input.includes("help")){
    world.order += 2;
  }

  world.instability = Math.abs(world.chaos - world.order);

  // multiplayer echo
  if(Math.random() < 0.3){
    let e = echoes[Math.random()*echoes.length|0];
    world.chaos += 2;
    addWorld("REMOTE EVENT: " + e);
  }

  checkEndings();
}

/* =========================
   ENDINGS
========================= */

function checkEndings(){

  if(world.instability > 80){
    addStatus("END: TOTAL COLLAPSE - The system failed completely.");
    return;
  }

  if(world.order > 80){
    addStatus("END: CONTROLLED REALITY - Order fully dominates.");
    return;
  }

  if(world.chaos > 80){
    addStatus("END: CHAOS ASCENSION - The system became unpredictable but alive.");
    return;
  }
}

/* =========================
   UI
========================= */

const chat=document.getElementById("chat");
const worldBox=document.getElementById("world");
const status=document.getElementById("status");
const input=document.getElementById("input");

function addChat(t,c){
  const d=document.createElement("div");
  d.className="msg "+c;
  d.textContent=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addWorld(t){
  const d=document.createElement("div");
  d.className="msg sys";
  d.textContent=t;
  worldBox.appendChild(d);
  worldBox.scrollTop=worldBox.scrollHeight;
}

function addStatus(t){
  const d=document.createElement("div");
  d.className="msg sys";
  d.textContent=t;
  status.appendChild(d);
}

/* =========================
   PLAYER RESPONSE
========================= */

function respond(input){
  let explanation = explainState();

  return `Here is what is happening:
- ${explanation}
- Order level: ${world.order}
- Chaos level: ${world.chaos}
- Instability: ${world.instability}

Your input changed the system state.`;
}

/* =========================
   SEND
========================= */

function send(){
  let t=input.value.trim();
  if(!t)return;

  addChat(t,"user");

  update(t);

  addChat(respond(t),"ai");

  input.value="";
}

/* boot */
addChat("You are now inside a system simulation. Your words change the world.","sys");

</script>

</body>
</html>
