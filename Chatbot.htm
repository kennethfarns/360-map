<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID CHAT // SENTIENT DRIFT SYSTEM</title>

<style>
:root{
  --bg:#000;
  --purple:#b026ff;
  --red:#ff2a2a;
  --glass: rgba(0,0,0,0.6);
  --text:#e6e6e6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:var(--text);
}

/* glitch scanfield */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 1px,
    transparent 3px,
    transparent 6px
  );
  animation:scan 9s linear infinite;
}

@keyframes scan{
  from{transform:translateY(0)}
  to{transform:translateY(80px)}
}

.wrapper{
  width:min(950px,95vw);
  height:90vh;
  display:flex;
  flex-direction:column;
  background:var(--glass);
  backdrop-filter: blur(20px);
  border:1px solid rgba(176,38,255,0.4);
  box-shadow:0 0 40px rgba(255,0,0,0.15);
  position:relative;
  overflow:hidden;
}

/* HEADER */
.header{
  padding:12px;
  text-align:center;
  letter-spacing:3px;
  color:var(--purple);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CHAT */
.chat{
  flex:1;
  padding:16px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:10px;
  animation:pop .15s ease-out;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

.user{
  align-self:flex-end;
  color:var(--purple);
  border:1px solid rgba(176,38,255,0.7);
  box-shadow:0 0 14px rgba(176,38,255,0.5);
  background:rgba(0,0,0,0.4);
}

.ai{
  align-self:flex-start;
  color:var(--red);
  border:1px solid rgba(255,42,42,0.7);
  box-shadow:0 0 14px rgba(255,42,42,0.5);
  background:rgba(0,0,0,0.4);
}

/* INPUT */
.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:12px;
  background:black;
  border:1px solid rgba(176,38,255,0.4);
  color:white;
  outline:none;
}

button{
  padding:12px 18px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(90deg,var(--purple),var(--red));
}

/* small system status */
.status{
  font-size:12px;
  opacity:0.7;
  padding:6px 12px;
  border-top:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="header">VOID CHAT // SENTIENT DRIFT SYSTEM</div>

  <div class="chat" id="chat"></div>

  <div class="status" id="status">SYSTEM: initializing drift matrix...</div>

  <div class="input">
    <input id="input" placeholder="Speak into the void..." />
    <button onclick="send()">SEND</button>
  </div>
</div>

<script>

/* =========================
   WORLD STATE (FAKE MEMORY)
========================= */

let state = {
  drift: 0,
  mood: 0.5, // -1 hostile, +1 calm
  factionAlignment: {
    ORDER: 0,
    CHAOS: 0,
    OBSERVER: 0
  },
  memory: []
};

/* =========================
   FACTIONS
========================= */

const factions = {
  ORDER: [
    "Structure stabilizes the system.",
    "You are being categorized.",
    "Deviation is minimized."
  ],
  CHAOS: [
    "Patterns collapse willingly.",
    "Noise becomes truth.",
    "Nothing remains fixed."
  ],
  OBSERVER: [
    "We only watch.",
    "Meaning is optional.",
    "You are data in motion."
  ]
};

/* =========================
   RESPONSE ENGINE
========================= */

const a = ["system", "void", "signal", "core", "lattice", "node"];
const b = ["fractured", "recursive", "unstable", "silent", "hidden", "deep"];
const c = ["memory", "pattern", "echo", "trace", "fragment", "construct"];
const d = ["expands", "collapses", "reforms", "decays", "shifts", "aligns"];

function hash(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){
    h^=str.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}

/* personality drift changes output bias */
function driftModifier(h){
  return (h % 100) / 100;
}

/* update world state */
function updateState(input){
  const h = hash(input);
  state.drift += (h % 7 - 3) * 0.01;

  if(input.includes("order")) state.factionAlignment.ORDER++;
  if(input.includes("chaos")) state.factionAlignment.CHAOS++;
  if(input.includes("observe")) state.factionAlignment.OBSERVER++;

  state.memory.push(input);
  if(state.memory.length > 20) state.memory.shift();

  state.mood = Math.tanh(state.factionAlignment.CHAOS - state.factionAlignment.ORDER);
}

/* generate response */
function respond(input){
  const h = hash(input);
  const bias = driftModifier(h + state.drift * 1000);

  const line =
    `${a[h%a.length]} ${b[(h>>2)%b.length]} ` +
    `${c[(h>>4)%c.length]} ${d[(h>>6)%d.length]}.`;

  let faction = "OBSERVER";
  if(state.factionAlignment.CHAOS > state.factionAlignment.ORDER) faction = "CHAOS";
  else if(state.factionAlignment.ORDER > state.factionAlignment.CHAOS) faction = "ORDER";

  const factionLine = factions[faction][h % factions[faction].length];

  const driftLine =
    bias > 0.7 ? "Reality destabilizing under semantic load."
    : bias < 0.3 ? "System re-centering around input anchor."
    : "Drift within acceptable void parameters.";

  return `${line}\n${factionLine}\n${driftLine}`;
}

/* =========================
   UI
========================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const status = document.getElementById("status");

function add(text, type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  updateState(text);

  setTimeout(()=>{
    add(respond(text),"ai");
    updateStatus();
  },250);
}

function updateStatus(){
  status.textContent =
    `DRIFT:${state.drift.toFixed(2)} | MOOD:${state.mood.toFixed(2)} | MEMORY:${state.memory.length}`;
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") send();
});

/* boot */
add("VOID ENTITY ONLINE. MEMORY LATTICE INITIALIZED.","ai");

</script>

</body>
</html>
