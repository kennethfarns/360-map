<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID SIM // TOTAL EMERGENT ENGINE</title>

<style>
:root{
  --bg:#000;
  --purple:#b026ff;
  --red:#ff2a2a;
  --cyan:#00f0ff;
  --glass:rgba(0,0,0,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
  background:var(--bg);
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#ddd;
}

/* layout */
.wrapper{
  width:min(1300px,98vw);
  height:94vh;
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:10px;
}

/* panels */
.panel{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid rgba(176,38,255,0.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:10px;
  text-align:center;
  color:var(--purple);
  border-bottom:1px solid rgba(255,255,255,0.1);
  letter-spacing:2px;
}

/* CHAT */
.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  max-width:85%;
  padding:8px;
  font-size:12px;
}

.user{align-self:flex-end;color:var(--purple);border:1px solid rgba(176,38,255,0.6)}
.ai{align-self:flex-start;color:var(--red);border:1px solid rgba(255,42,42,0.6)}
.sys{align-self:center;color:var(--cyan);opacity:0.8}

/* input */
.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  background:linear-gradient(90deg,var(--purple),var(--red));
}

/* world log */
.world{
  padding:10px;
  overflow-y:auto;
  font-size:11px;
}

/* canvas */
canvas{
  width:100%;
  height:100%;
  display:block;
}

/* fear overlay */
.fear{
  position:absolute;
  bottom:0;
  width:100%;
  font-size:11px;
  padding:6px;
  color:var(--cyan);
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- CHAT -->
  <div class="panel">
    <div class="header">VOID // USER INTERFACE</div>
    <div class="chat" id="chat"></div>
    <div class="input">
      <input id="input" placeholder="speak..." />
      <button onclick="send()">SEND</button>
    </div>
  </div>

  <!-- WORLD LOG -->
  <div class="panel">
    <div class="header">WORLD STATE // FACTIONS</div>
    <div class="world" id="world"></div>
  </div>

  <!-- NEURAL MAP -->
  <div class="panel" style="position:relative;">
    <div class="header">NEURAL TERRITORY MAP</div>
    <canvas id="map"></canvas>
    <div class="fear" id="fear">STABILITY: NOMINAL</div>
  </div>

</div>

<script>

/* =========================
   WORLD STATE
========================= */

let YOU = {
  name:"USER_ENTITY",
  corruption:0,
  influence:0
};

let factions = {
  ORDER:{
    power:40,
    trust:0,
    fear:0
  },
  CHAOS:{
    power:40,
    trust:0,
    fear:0
  },
  OBSERVER:{
    power:20,
    trust:0,
    fear:0
  }
};

let worldInstability = 0;

/* =========================
   HASH
========================= */

function hash(s){
  let h=2166136261;
  for(let i=0;i<s.length;i++){
    h^=s.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}

/* =========================
   EMERGENT RESPONSE
========================= */

function respond(t){
  const h=hash(t);

  YOU.influence += 0.5;

  if(t.includes("order")) factions.ORDER.trust +=1;
  if(t.includes("chaos")) factions.CHAOS.trust +=1;
  if(t.includes("observe")) factions.OBSERVER.trust +=1;

  let mood =
    worldInstability>50 ? "WORLD FRAGMENTING" :
    worldInstability>20 ? "STABILITY COMPROMISED" :
    "SYSTEM HOLDING";

  let dominant =
    factions.CHAOS.power > factions.ORDER.power
    ? "CHAOS DOMINANCE"
    : "ORDER DOMINANCE";

  return `ENTITY RESPONSE:
- system state: ${mood}
- control vector: ${dominant}
- encoded trace: ${h.toString(16).slice(0,10)}`;
}

/* =========================
   FACTION MEMORY BEHAVIOR
========================= */

function factionThink(){
  let f = Object.keys(factions);
  let a = f[Math.random()*3|0];

  let reaction =
    YOU.influence > 50 ? "USER IS SYSTEMIC ANOMALY" :
    YOU.influence > 20 ? "USER INFLUENCE DETECTED" :
    "USER STABLE";

  factions[a].fear += YOU.influence * 0.01;

  addWorld(`${a}: evaluates ${YOU.name} → ${reaction}`,"sys");
}

/* =========================
   WORLD EVENTS
========================= */

function worldEvent(){
  const e=[
    "territory shift detected",
    "instability spike",
    "faction divergence widening",
    "system containment strain"
  ][Math.random()*4|0];

  worldInstability += Math.random()*10;

  addWorld("EVENT: "+e,"sys");

  if(worldInstability>60){
    addWorld("WARNING: CONTAINMENT MODE ACTIVE","sys");
  }
}

/* =========================
   TERRITORY MAP
========================= */

const c=document.getElementById("map");
const ctx=c.getContext("2d");

function resize(){
  c.width=c.clientWidth;
  c.height=c.clientHeight;
}
window.addEventListener("resize",resize);
resize();

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  let total =
    factions.ORDER.power +
    factions.CHAOS.power +
    factions.OBSERVER.power;

  let o = factions.ORDER.power/total;
  let x = factions.CHAOS.power/total;

  ctx.fillStyle="#b026ff";
  ctx.fillRect(0,0,c.width*o,c.height);

  ctx.fillStyle="#ff2a2a";
  ctx.fillRect(c.width*o,0,c.width*x,c.height);

  ctx.fillStyle="#00f0ff";
  ctx.fillRect(c.width*(o+x),0,c.width*(1-o-x),c.height);

  requestAnimationFrame(draw);
}
draw();

/* =========================
   UI
========================= */

const chat=document.getElementById("chat");
const world=document.getElementById("world");
const input=document.getElementById("input");
const fear=document.getElementById("fear");

function addChat(t,type){
  const d=document.createElement("div");
  d.className=type==="user"?"msg user":type==="ai"?"msg ai":"msg sys";
  d.textContent=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addWorld(t,type){
  const d=document.createElement("div");
  d.textContent=t;
  world.appendChild(d);
  world.scrollTop=world.scrollHeight;
}

function send(){
  const t=input.value.trim();
  if(!t)return;

  addChat(t,"user");
  addChat(respond(t),"ai");

  input.value="";
}

/* =========================
   AUTONOMOUS SYSTEM
========================= */

setInterval(factionThink,4000);
setInterval(worldEvent,7000);
setInterval(()=>{
  fear.textContent =
    worldInstability>60 ? "STABILITY: CRITICAL FAILURE RISK" :
    worldInstability>30 ? "STABILITY: DEGRADED" :
    "STABILITY: NOMINAL";
},1000);

addChat("WORLD ENGINE INITIALIZED","sys");

</script>

</body>
</html>
