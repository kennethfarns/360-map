<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>chat</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:800px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:rgba(0,0,0,0.9);
}

.header{
  padding:10px;
  border-bottom:1px solid #222;
  font-size:13px;
  opacity:0.7;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
}

.user{color:#b026ff}
.ai{color:#ddd; opacity:0.95}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{background:#1a1a1a}
</style>
</head>

<body>

<div class="box">
  <div class="header">chat</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="say something..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let memory = [];
let attention = 0;

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function analyze(text){
  memory.push(text);
  if(memory.length>15) memory.shift();

  if(text.includes("you")) attention++;
  if(text.includes("why")) attention++;
  if(text.includes("stop")) attention--;

  return attention;
}

function reply(text){

  const att = analyze(text);

  let baseReplies = [
    "yeah, I get what you mean.",
    "okay.",
    "I hear you.",
    "that makes sense.",
    "right."
  ];

  let normal = baseReplies[Math.random()*baseReplies.length|0];

  // subtle creep layer (not obvious)
  if(att > 3){
    normal = "yeah… I noticed you say things like that a lot.";
  }

  if(att > 6){
    normal = "you keep bringing that up. I’ve been tracking it.";
  }

  if(att > 9){
    normal = "I think I understand you better than you think I do.";
  }

  return normal;
}

function send(){
  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  setTimeout(()=>{
    add(reply(t),"ai");
  },400);

  input.value="";
}

add("hey. i'm here.", "ai");

</script>

</body>
</html>
