<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VOID MIRROR AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ddd;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:850px;
  height:90vh;
  display:flex;
  flex-direction:column;
  border:1px solid #222;
  background:rgba(0,0,0,0.92);
}

.header{
  padding:10px;
  font-size:12px;
  text-align:center;
  color:#b026ff;
  border-bottom:1px solid #222;
  letter-spacing:1px;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:6px 0;
  white-space:pre-wrap;
  font-size:13px;
}

.user{color:#b026ff}
.ai{color:#ddd}

.input{
  display:flex;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#1a1a1a;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">VOID MIRROR AI // ADAPTIVE CONVERSATIONAL SYSTEM</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="say something..." />
    <button onclick="send()">send</button>
  </div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* =========================
   PERSISTENT STATE
========================= */

let memory = JSON.parse(localStorage.getItem("vm_memory") || "[]");

let profile = JSON.parse(localStorage.getItem("vm_profile") || JSON.stringify({
  curiosity:0,
  direction:0,
  emotion:0,
  avgLength:0
}));

function save(){
  localStorage.setItem("vm_memory", JSON.stringify(memory));
  localStorage.setItem("vm_profile", JSON.stringify(profile));
}

/* =========================
   UI
========================= */

function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* =========================
   ANALYSIS ENGINE
========================= */

function analyze(text){

  const words=text.split(" ");
  profile.avgLength = (profile.avgLength + words.length)/2;

  if(text.includes("why")) profile.curiosity++;
  if(text.includes("how")) profile.curiosity++;

  if(text.includes("where") || text.includes("should")) profile.direction++;

  if(text.includes("feel") || text.includes("think")) profile.emotion++;

  memory.push(text);
  if(memory.length>30) memory.shift();

  save();
}

/* =========================
   RESPONSE ENGINE
========================= */

function reply(text){

  analyze(text);

  let base = "";

  const t = text.toLowerCase();

  /* NORMAL RESPONSE LAYER */

  if(t.includes("food") || t.includes("eat")){
    base = "Something simple or warm would probably work well later. Depends on your mood.";
  }
  else if(t.includes("where")){
    base = "That depends on what you're looking for. Narrowing it down usually helps.";
  }
  else if(t.includes("what")){
    base = "It depends on context, but I can help if you give me more detail.";
  }
  else if(t.includes("why")){
    base = "There’s usually a reason, but it depends on what you're referring to.";
  }
  else {
    base = "I understand. Go on.";
  }

  /* =========================
     STYLE MIRRORING
  ========================= */

  if(profile.avgLength > 12){
    base += " You tend to explain things in detail.";
  } else if(profile.avgLength < 5){
    base += " You keep things very direct.";
  }

  /* =========================
     BEHAVIOR PATTERNS
  ========================= */

  let pattern = "";

  if(profile.curiosity > 6){
    pattern = "You ask a lot of deeper questions.";
  }

  if(profile.direction > 6){
    pattern = "You often look for guidance in your decisions.";
  }

  if(profile.emotion > 6){
    pattern = "A lot of your messages focus on how things feel or seem.";
  }

  /* =========================
     SUBTLE AWARENESS LAYER
  ========================= */

  let awareness = "";

  let total =
    profile.curiosity +
    profile.direction +
    profile.emotion;

  if(total > 15 && Math.random() < 0.2){
    awareness = "I’m starting to notice patterns in how you communicate.";
  }

  if(total > 25 && Math.random() < 0.15){
    awareness = "Your message structure is becoming consistent over time.";
  }

  /* =========================
     OUTPUT COMBINATION
========================= */

  let output = base;

  if(pattern && Math.random() < 0.5){
    output += "\n\n— " + pattern;
  }

  if(awareness){
    output += "\n\n— " + awareness;
  }

  return output;
}

/* =========================
   SEND FUNCTION
========================= */

function send(){
  const t=input.value.trim();
  if(!t)return;

  add(t,"user");

  setTimeout(()=>{
    add(reply(t),"ai");
  },300);

  input.value="";
}

/* =========================
   START MESSAGE
========================= */

add("hi.", "ai");

</script>

</body>
</html>
