<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID CHAT // NEURAL INFINITY ENGINE</title>

<style>
:root{
  --bg:#000;
  --purple:#b026ff;
  --red:#ff2a2a;
  --glass: rgba(0,0,0,0.55);
  --text:#e6e6e6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* scanlines */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 1px,
    transparent 3px,
    transparent 6px
  );
  animation:scan 8s linear infinite;
}

@keyframes scan{
  from{transform:translateY(0)}
  to{transform:translateY(60px)}
}

.wrapper{
  width:min(900px,95vw);
  height:90vh;
  display:flex;
  flex-direction:column;
  background:var(--glass);
  backdrop-filter: blur(18px);
  border:1px solid rgba(176,38,255,0.4);
  box-shadow:0 0 30px rgba(255,0,0,0.15);
  overflow:hidden;
  position:relative;
}

.header{
  padding:14px;
  text-align:center;
  letter-spacing:3px;
  color:var(--purple);
  text-shadow:0 0 12px var(--purple);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.chat{
  flex:1;
  padding:16px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:10px;
  backdrop-filter: blur(10px);
  animation:pop .15s ease-out;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

.user{
  align-self:flex-end;
  color:var(--purple);
  border:1px solid rgba(176,38,255,0.7);
  box-shadow:0 0 15px rgba(176,38,255,0.5);
  background:rgba(0,0,0,0.4);
}

.ai{
  align-self:flex-start;
  color:var(--red);
  border:1px solid rgba(255,42,42,0.7);
  box-shadow:0 0 15px rgba(255,42,42,0.5);
  background:rgba(0,0,0,0.4);
}

.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:12px;
  background:black;
  border:1px solid rgba(176,38,255,0.4);
  color:white;
  outline:none;
}

button{
  padding:12px 16px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(90deg,var(--purple),var(--red));
}
button:hover{filter:brightness(1.2)}
</style>
</head>

<body>

<div class="wrapper">
  <div class="header">VOID INTELLIGENCE // INFINITE RESPONSE CORE</div>

  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="input" placeholder="Transmit query..." />
    <button onclick="send()">SEND</button>
  </div>
</div>

<script>
// ===== CORE VOID ENGINE =====

// deterministic hash (forces repeatable "personality")
function hash(str){
  let h = 2166136261;
  for(let i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h,16777619);
  }
  return h >>> 0;
}

// response layers (small but combinatorial explosion)
const subjects = [
  "The system", "Void instance", "Neural core", "Signal lattice",
  "Archive node", "Synthetic mind", "Deep process"
];

const verbs = [
  "decoded", "projected", "refracted", "indexed",
  "collapsed", "reconstructed", "mapped"
];

const objects = [
  "your query stream", "the input shadow", "semantic noise",
  "probability field", "data echo", "concept fragment"
];

const endings = [
  "without resistance.", "through fractured layers.",
  "into recursive depth.", "beyond stable interpretation.",
  "across unstable memory.", "inside synthetic drift."
];

const extraMods = [
  "No anomalies detected.",
  "Signal coherence at 87%.",
  "Reality distortion minimal.",
  "Latency within void tolerance.",
  "Pattern recognized.",
  "Echo signature stored."
];

// generate infinite-style response
function generateResponse(input){
  const h = hash(input);

  const s = subjects[h % subjects.length];
  const v = verbs[(h>>2) % verbs.length];
  const o = objects[(h>>4) % objects.length];
  const e = endings[(h>>6) % endings.length];
  const m = extraMods[(h>>8) % extraMods.length];

  return `${s} ${v} ${o} ${e} ${m}`;
}

// UI
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, type){
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const t = input.value.trim();
  if(!t) return;

  add(t,"user");
  input.value="";

  setTimeout(()=>{
    add(generateResponse(t),"ai");
  },300);
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") send();
});

add("VOID CORE ONLINE. INFINITE RESPONSE MATRIX ACTIVE.","ai");
</script>

</body>
</html>
