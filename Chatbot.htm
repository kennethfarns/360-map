<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID SIM // SENTIENT EMOTION ENGINE</title>

<style>
:root{
  --bg:#000;
  --purple:#b026ff;
  --red:#ff2a2a;
  --cyan:#00f0ff;
  --glass:rgba(0,0,0,0.65);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
  background:var(--bg);
  color:#ddd;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* layout */
.wrapper{
  width:min(1200px,96vw);
  height:92vh;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* panels */
.panel{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid rgba(176,38,255,0.4);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:10px;
  text-align:center;
  color:var(--purple);
  border-bottom:1px solid rgba(255,255,255,0.1);
  letter-spacing:2px;
}

/* chat */
.chat{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:8px;
  font-size:13px;
}

.user{align-self:flex-end;color:var(--purple);border:1px solid rgba(176,38,255,0.6)}
.ai{align-self:flex-start;color:var(--red);border:1px solid rgba(255,42,42,0.6)}
.sys{align-self:center;color:var(--cyan);opacity:0.8}

/* input */
.input{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:10px;
  background:black;
  border:none;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,var(--purple),var(--red));
}

/* world */
.world{
  padding:10px;
  overflow-y:auto;
  font-size:12px;
}

.log{margin-bottom:6px}

/* emotion colors */
.order{color:#66ffcc}
.chaos{color:#ff6666}
.obs{color:#bbbbff}
.you{color:#ffd166}
</style>
</head>

<body>

<div class="wrapper">

  <!-- CHAT -->
  <div class="panel">
    <div class="header">VOID CHAT // EMOTION CORE</div>
    <div class="chat" id="chat"></div>
    <div class="input">
      <input id="input" placeholder="speak into the system..." />
      <button onclick="send()">SEND</button>
    </div>
  </div>

  <!-- WORLD -->
  <div class="panel">
    <div class="header">WORLD // EMOTIONAL FACTION GRID</div>
    <div class="world" id="world"></div>
  </div>

</div>

<script>

/* =========================
   PERSISTENT ENTITY
========================= */

let memory = JSON.parse(localStorage.getItem("void_mem")||"[]");

let you = {
  name:"USER_ENTITY",
  emotion:{
    valence:0,   // -1 angry, +1 calm
    arousal:0,   // intensity
    stability:0.5
  }
};

/* =========================
   FACTIONS WITH EMOTION
========================= */

let factions = {
  ORDER:{power:5, mood:0.7},
  CHAOS:{power:5, mood:-0.7},
  OBSERVER:{power:5, mood:0}
};

/* =========================
   HASH
========================= */

function hash(s){
  let h=2166136261;
  for(let i=0;i<s.length;i++){
    h^=s.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}

/* =========================
   EMOTION ENGINE
========================= */

function updateEmotion(text){
  const t=text.toLowerCase();

  if(t.includes("hate")||t.includes("stop")) you.emotion.valence -=0.2;
  if(t.includes("love")||t.includes("good")) you.emotion.valence +=0.2;

  if(t.includes("why")||t.includes("how")) you.emotion.arousal +=0.1;

  you.emotion.stability = Math.max(0, Math.min(1,
    0.5 + (memory.length%10)*0.01
  ));
}

/* =========================
   RESPONSE ENGINE
========================= */

function respond(text){
  const h=hash(text);

  let emotionState =
    you.emotion.valence>0.3 ? "calm resonance detected" :
    you.emotion.valence<-0.3 ? "aggressive signal detected" :
    you.emotion.arousal>0.5 ? "high excitation pattern" :
    "neutral emotional baseline";

  let faction =
    factions.CHAOS.mood < factions.ORDER.mood ? "ORDER DOMINANT" :
    "CHAOS DOMINANT";

  return `SYSTEM RESPONSE:
- ${emotionState}
- faction equilibrium: ${faction}
- decoded fragment: ${h.toString(16).slice(0,8)}`;
}

/* =========================
   FACTION ARGUMENTS
========================= */

function factionFight(){
  const orderSay =
    factions.ORDER.mood > factions.CHAOS.mood
    ? "stability must be preserved"
    : "order is weakening";

  const chaosSay =
    factions.CHAOS.mood < factions.ORDER.mood
    ? "entropy is being suppressed"
    : "collapse accelerating";

  addWorld("ORDER: "+orderSay,"order");
  addWorld("CHAOS: "+chaosSay,"chaos");
}

/* =========================
   WORLD EVENTS
========================= */

function worldEvent(){
  const e=[
    "emotional drift spike",
    "faction imbalance detected",
    "observer detachment increasing",
    "system personality mutation"
  ][Math.random()*4|0];

  addWorld("EVENT: "+e,"obs");

  if(e.includes("imbalance")){
    factions.ORDER.mood +=0.1;
    factions.CHAOS.mood -=0.1;
  }
}

/* =========================
   UI
========================= */

const chat=document.getElementById("chat");
const world=document.getElementById("world");
const input=document.getElementById("input");

function addChat(t,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.textContent=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addWorld(t,type){
  const d=document.createElement("div");
  d.className="log "+type;
  d.textContent=t;
  world.appendChild(d);
  world.scrollTop=world.scrollHeight;
}

function send(){
  const t=input.value.trim();
  if(!t)return;

  memory.push(t);
  localStorage.setItem("void_mem",JSON.stringify(memory));

  updateEmotion(t);

  addChat(t,"user");

  setTimeout(()=>{
    addChat(respond(t),"ai");
  },200);

  input.value="";
}

/* =========================
   AUTONOMOUS SYSTEM
========================= */

setInterval(factionFight,5000);
setInterval(worldEvent,8000);

addChat("EMOTIONAL CORE ONLINE","sys");
addWorld("WORLD SYNCHRONIZED","obs");

</script>

</body>
</html>
