<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>VOID TERMINAL CHAT</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', monospace;
}

body {
  background: #000;
  color: white;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* GLITCH HEADER */
header {
  text-align: center;
  padding: 18px;
  font-size: 22px;
  letter-spacing: 4px;
  position: relative;
  color: #ff003c;
  text-shadow:
    0 0 10px #ff003c,
    0 0 20px #9900ff;
  animation: glitch 1.5s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); filter: hue-rotate(0deg); }
  20% { transform: translate(-1px, 1px); }
  40% { transform: translate(1px, -1px); }
  60% { transform: translate(-2px, 1px); }
  80% { transform: translate(1px, 2px); }
  100% { transform: translate(0); filter: hue-rotate(360deg); }
}

/* CHAT WINDOW */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* GLASS PANEL */
.message {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 12px;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  line-height: 1.4;
  animation: fadeIn 0.2s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* USER (PURPLE VOID GLASS) */
.user {
  align-self: flex-end;
  color: #c77dff;
  box-shadow:
    0 0 10px #a020f0,
    0 0 25px #6a00ff;
  border: 1px solid #7b2cff;
}

/* AI (RED NEON VOID) */
.ai {
  align-self: flex-start;
  color: #ff3b3b;
  box-shadow:
    0 0 10px #ff003c,
    0 0 25px #ff004f;
  border: 1px solid #ff004f;
}

/* INPUT AREA */
#inputArea {
  display: flex;
  padding: 12px;
  background: rgba(10,10,10,0.8);
  border-top: 1px solid #222;
  backdrop-filter: blur(10px);
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 8px;
  border: 1px solid #333;
  box-shadow: 0 0 10px rgba(128,0,255,0.2);
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  background: black;
  border: 1px solid #ff003c;
  color: #ff003c;
  cursor: pointer;
  border-radius: 8px;
  box-shadow: 0 0 12px #ff003c;
  transition: 0.2s;
}

button:hover {
  box-shadow: 0 0 20px #a020f0;
  border-color: #a020f0;
  color: #a020f0;
}
</style>
</head>

<body>

<header>VOID // NEURAL CHAT INTERFACE</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Enter transmission..." />
  <button onclick="sendMessage()">SEND</button>
</div>

<script>
/* =========================
   CONFIG — PUT YOUR KEY HERE
========================= */
const HF_API_KEY = "YOUR_HUGGING_FACE_API_KEY_HERE";
const MODEL = "mistralai/Mistral-7B-Instruct-v0.2";

/* ========================= */

const chat = document.getElementById("chat");
const input = document.getElementById("msg");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const aiBubble = addMessage("...", "ai");

  try {
    const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${HF_API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: text,
        parameters: {
          max_new_tokens: 256,
          temperature: 0.7,
          return_full_text: false
        }
      })
    });

    const data = await response.json();

    let output =
      data?.[0]?.generated_text ||
      data?.generated_text ||
      JSON.stringify(data);

    aiBubble.textContent = output;

  } catch (err) {
    aiBubble.textContent = "ERROR: SIGNAL LOST IN THE VOID";
  }

  chat.scrollTop = chat.scrollHeight;
}

/* ENTER KEY SUPPORT */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
