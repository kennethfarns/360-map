<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Command Globe</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width: 100%; height: 100%; margin: 0; overflow: hidden; background: black;
}
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: cyan;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  font-family: monospace;
  border: 1px solid cyan;
}
input, button {
  background: black;
  color: cyan;
  border: 1px solid cyan;
}
</style>
</head>

<body>
<div id="hud">
<div>🌐 COMMAND GLOBE</div>

Lat <input id="latInput" size="5">
<select id="latDir">
  <option>N</option>
  <option>S</option>
</select>

Lng <input id="lngInput" size="5">
<select id="lngDir">
  <option>E</option>
  <option>W</option>
</select>

<button onclick="addPin()">Pin</button>
<div id="time"></div>
</div>

<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5ZjgwOGU2MS03MDQ2LTQ3OWItOGQ4MC00Nzg5Yzc0ODFkNmQiLCJpZCI6NDIxMzAwLCJpYXQiOjE3NzY3Nzc0Nzl9.r1LGprxqoi0TGlWTyk8IFdSd-SBGFJBWWCGWmb00g0s";

const viewer = new Cesium.Viewer("cesiumContainer", {
  terrain: Cesium.Terrain.fromWorldTerrain(),
  shouldAnimate: true
});

// 🌞 Lighting
viewer.scene.globe.enableLighting = true;

// 🕒 UTC Clock (FIXED)
const timeEl = document.getElementById("time");
setInterval(() => {
  timeEl.innerText = "UTC: " + new Date().toUTCString();
}, 1000);

// 🌍 UTC LINE (FIXED PROPERLY)
const utcLine = [];

for (let i = -90; i <= 90; i++) {
  utcLine.push(0, i);
}

viewer.entities.add({
  polyline: {
    positions: Cesium.Cartesian3.fromDegreesArray(utcLine),
    width: 2,
    material: Cesium.Color.CYAN.withAlpha(0.8)
  }
});

// 🧭 Convert coords
function convert(val, dir){
  let n = parseFloat(val);
  if (isNaN(n)) return null;
  if (dir === "S" || dir === "W") n *= -1;
  return n;
}

// 📍 SINGLE CLEAN addPin (FIXED)
function addPin(){

  const latVal = document.getElementById("latInput").value;
  const lngVal = document.getElementById("lngInput").value;

  const latDir = document.getElementById("latDir").value;
  const lngDir = document.getElementById("lngDir").value;

  let lat = convert(latVal, latDir);
  let lng = convert(lngVal, lngDir);

  if (lat === null || lng === null) return;

  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lng, lat),
    point: {
      pixelSize: 10,
      color: Cesium.Color.RED
    },
    label: {
      text: `${lat.toFixed(2)}°, ${lng.toFixed(2)}°`,
      fillColor: Cesium.Color.CYAN,
      outlineColor: Cesium.Color.BLACK,
      outlineWidth: 2
    }
  });

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 2000000)
  });
}

// 🖱 Street View
viewer.screenSpaceEventHandler.setInputAction(function(click){

  const picked = viewer.scene.pick(click.position);
  if (!picked) return; // only globe clicks

  const cartesian = viewer.scene.pickPosition(click.position);
  if (!cartesian) return;

  const c = Cesium.Cartographic.fromCartesian(cartesian);
  const lat = Cesium.Math.toDegrees(c.latitude);
  const lng = Cesium.Math.toDegrees(c.longitude);

  window.open(
    `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`,
    "_blank"
  );

}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ✈️ Aircraft (unchanged but safe)
let aircraftEntities = [];

async function flights(){
  try{
    const res = await fetch("https://opensky-network.org/api/states/all");
    const data = await res.json();

    // clear old aircraft
    aircraftEntities.forEach(e => viewer.entities.remove(e));
    aircraftEntities = [];

    data.states.slice(0,40).forEach(f=>{
      if(f[5] && f[6]){
        let e = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(f[5], f[6]),
          point: {
            pixelSize: 4,
            color: Cesium.Color.YELLOW
          }
        });
        aircraftEntities.push(e);
      }
    });

  }catch(e){}
}

setInterval(flights, 10000);

// 🌧 Weather (unchanged)
async function weather(){
  try{
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=0&longitude=0&current_weather=true");
    await res.json();
    console.log("Weather Loaded");
  }catch(e){}
}
weather();

</script>
</body>
</html>
