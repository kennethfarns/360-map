<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UTC Globe</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.162.0/build/three.module.js";
import ThreeGlobe from "https://unpkg.com/three-globe@2.30.0/dist/three-globe.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 300;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌍 Create globe
const globe = new ThreeGlobe()
  .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-night.jpg");

// UTC line (0° longitude)
const utcLine = Array.from({ length: 181 }, (_, i) => ({
  lat: -90 + i,
  lng: 0
}));

globe
  .polylinesData([{ path: utcLine }])
  .polylinesColor(() => "#00ffff")
  .polylinesWidth(2);

scene.add(globe);

// 💡 Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1));
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(100, 100, 100);
scene.add(light);

// 🔄 Animate
function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();

// 📱 Resize fix
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
