<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate UTC Globe</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
html, body, #cesiumContainer {
  width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
}
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  color: cyan;
  padding: 10px;
}
</style>
</head>
<body>

<div id="ui">
Lat: <input id="lat" size="5">
<select id="latDir"><option>N</option><option>S</option></select>
Lng: <input id="lng" size="5">
<select id="lngDir"><option>E</option><option>W</option></select>
<button onclick="addPin()">Pin</button>
</div>

<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5ZjgwOGU2MS03MDQ2LTQ3OWItOGQ4MC00Nzg5Yzc0ODFkNmQiLCJpZCI6NDIxMzAwLCJpYXQiOjE3NzY3Nzc0Nzl9.r1LGprxqoi0TGlWTyk8IFdSd-SBGFJBWWCGWmb00g0s';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrain: Cesium.Terrain.fromWorldTerrain(),
  timeline: false,
  animation: false
});

// 🌍 UTC LINE (Prime Meridian)
viewer.entities.add({
  polyline: {
    positions: Cesium.Cartesian3.fromDegreesArray(
      Array.from({length: 181}, (_,i)=>[0, -90 + i]).flat()
    ),
    width: 3,
    material: Cesium.Color.CYAN
  }
});

// 🧭 Convert coords
function convert(val, dir){
  let n = parseFloat(val);
  if(isNaN(n)) return null;
  if(dir === "S" || dir === "W") n *= -1;
  return n;
}

// 📍 Add pin
function addPin(){
  let lat = convert(latInput.value, latDir.value);
  let lng = convert(lngInput.value, lngDir.value);

  if(lat==null || lng==null) return;

  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lng, lat),
    point: { pixelSize: 10, color: Cesium.Color.RED },
    label: {
      text: `${lat.toFixed(2)}, ${lng.toFixed(2)}`,
      fillColor: Cesium.Color.CYAN
    }
  });

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, 2000000)
  });
}

// 🖱 Click → Street View
viewer.screenSpaceEventHandler.setInputAction(function(click){
  const cartesian = viewer.scene.pickPosition(click.position);
  if(cartesian){
    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
    const lat = Cesium.Math.toDegrees(cartographic.latitude);
    const lng = Cesium.Math.toDegrees(cartographic.longitude);

    const url = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`;
    window.open(url, "_blank");
  }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);
</script>

</body>
</html>
