<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UTC Globe (Double-Click Ready)</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<canvas id="globe"></canvas>

<script>
const canvas = document.getElementById("globe");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rotation = 0;

function drawGlobe() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(cx, cy) * 0.8;

  // Draw sphere
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = "#0a0a0a";
  ctx.fill();
  ctx.strokeStyle = "#444";
  ctx.stroke();

  // Draw longitude lines
  for (let i = -180; i <= 180; i += 30) {
    const angle = (i + rotation) * Math.PI / 180;
    ctx.beginPath();
    for (let lat = -90; lat <= 90; lat++) {
      const phi = lat * Math.PI / 180;
      const x = cx + radius * Math.cos(phi) * Math.sin(angle);
      const y = cy + radius * Math.sin(phi);
      if (lat === -90) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = i === 0 ? "#00ffff" : "#333"; // UTC line highlighted
    ctx.lineWidth = i === 0 ? 2 : 1;
    ctx.stroke();
  }

  // Draw latitude lines
  for (let lat = -60; lat <= 60; lat += 30) {
    const phi = lat * Math.PI / 180;
    ctx.beginPath();
    for (let lon = -180; lon <= 180; lon++) {
      const theta = (lon + rotation) * Math.PI / 180;
      const x = cx + radius * Math.cos(phi) * Math.sin(theta);
      const y = cy + radius * Math.sin(phi);
      if (lon === -180) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "#333";
    ctx.stroke();
  }

  rotation += 0.3;
  requestAnimationFrame(drawGlobe);
}

drawGlobe();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
